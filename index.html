<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFK TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .bandeau {
            background-color: #53fc18;
            color: #0f0f0f;
            padding: 8px;
            font-weight: bold;
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
        }
        .bandeau-inner {
            display: inline-block;
            animation: defilement 15s linear infinite;
        }
        @keyframes defilement {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 20px auto;
            display: block;
            border: 3px solid #53fc18;
        }
        h1 { color: #53fc18; padding: 10px 20px 20px; font-size: 36px; }
        .visiteurs { color: #aaa; font-size: 14px; margin-bottom: 15px; }
        .video-container { width: 80%; margin: 0 auto; }
        iframe.stream { width: 100%; height: 500px; border: none; }
        .boutons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px auto;
            flex-wrap: wrap;
        }
        .discord-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
        }
        .discord-btn:hover { background-color: #4752c4; }
        .kick-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #53fc18;
            color: #0f0f0f;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
        }
        .kick-btn:hover { background-color: #3fd410; }
        .chat-container {
            width: 80%;
            margin: 20px auto 40px;
            background-color: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
        }
        .chat-messages {
            height: 300px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #0f0f0f;
            border-radius: 8px;
        }
        .chat-message {
            margin: 8px 0;
            padding: 8px;
            background-color: #1a1a1a;
            border-radius: 5px;
            border-left: 3px solid #53fc18;
        }
        .heure { font-size: 11px; color: #888; margin-left: 8px; }
        .chat-input { display: flex; gap: 10px; flex-wrap: wrap; }
        .chat-input input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background-color: #0f0f0f;
            color: white;
            font-size: 14px;
        }
        #pseudo { width: 150px; }
        #messageInput { flex: 1; min-width: 200px; }
        .chat-input button {
            padding: 10px 20px;
            background-color: #53fc18;
            color: #0f0f0f;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .char-count { font-size: 12px; color: #888; text-align: right; margin-top: 5px; }
        .cooldown-msg { color: #ff4444; font-size: 13px; margin-top: 8px; display: none; }

        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            .video-container { width: 100%; }
            iframe.stream { height: 250px; }
            .chat-container { width: 95%; }
            h1 { font-size: 24px; }
            .boutons { flex-direction: column; align-items: center; }
            #pseudo { width: 100%; }
            #messageInput { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Bandeau défilant -->
    <div class="bandeau">
        <span class="bandeau-inner">
            🛒 -5% sur le shop avec le code <strong>AFK-TV-2K26</strong> ! &nbsp;&nbsp;&nbsp;&nbsp;
            🛒 -5% sur le shop avec le code <strong>AFK-TV-2K26</strong> ! &nbsp;&nbsp;&nbsp;&nbsp;
            🛒 -5% sur le shop avec le code <strong>AFK-TV-2K26</strong> !
        </span>
    </div>

    <!-- Logo -->
    <img src="logo.png" alt="AFK TV Logo" class="logo">

    <h1>AFK TV</h1>

    <!-- Compteur visiteurs -->
    <div class="visiteurs">👥 <span id="compteur">...</span> visiteurs en ligne</div>

    <!-- Stream Kick -->
    <div class="video-container">
        <iframe
            class="stream"
            src="https://player.kick.com/c-slk"
            allowfullscreen
            allow="autoplay; fullscreen">
        </iframe>
    </div>

    <!-- Boutons -->
    <div class="boutons">
        <a href="https://discord.gg/bZB4u7TQvk" class="discord-btn" target="_blank">💬 Rejoindre le Discord</a>
        <a href="https://kick.com/c-slk" class="kick-btn" target="_blank">🎮 Suivre sur Kick</a>
    </div>

    <!-- Chat -->
    <div class="chat-container">
        <h2 style="color:#53fc18; margin-bottom:15px;">Chat en Direct</h2>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
            <input type="text" id="pseudo" placeholder="Pseudo (max 20)" maxlength="20">
            <input type="text" id="messageInput" placeholder="Message (max 250)..." maxlength="250" oninput="updateCharCount()">
            <button onclick="sendMessage()">Envoyer</button>
        </div>
        <div class="char-count"><span id="charCount">0</span>/250</div>
        <p class="cooldown-msg" id="cooldownMsg"></p>
    </div>

    <script>
        let lastMessageTime = {};

        // Compteur visiteurs simulé
        function updateCompteur() {
            const base = 10;
            const variation = Math.floor(Math.random() * 20);
            document.getElementById('compteur').textContent = base + variation;
        }
        updateCompteur();
        setInterval(updateCompteur, 30000);

        function updateCharCount() {
            const msg = document.getElementById('messageInput').value;
            document.getElementById('charCount').textContent = msg.length;
        }

        function sendMessage() {
            const pseudo = document.getElementById('pseudo').value.trim();
            const message = document.getElementById('messageInput').value.trim();
            const cooldownMsg = document.getElementById('cooldownMsg');
            const now = Date.now();

            if (!pseudo) { alert('⚠️ Entre un pseudo !'); return; }
            if (pseudo.length > 20) { alert('⚠️ Pseudo trop long ! Max 20 caractères.'); return; }
            if (!message) return;
            if (message.length > 250) { alert('⚠️ Message trop long ! Max 250 caractères.'); return; }

            if (lastMessageTime[pseudo] && now - lastMessageTime[pseudo] < 15 * 60 * 1000) {
                const restant = Math.ceil((15 * 60 * 1000 - (now - lastMessageTime[pseudo])) / 60000);
                cooldownMsg.style.display = 'block';
                cooldownMsg.textContent = `⏳ Attends encore ${restant} minute(s) !`;
                return;
            }

            cooldownMsg.style.display = 'none';
            lastMessageTime[pseudo] = now;

            const chatMessages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'chat-message';

            const now_date = new Date();
            const heure = `${now_date.getHours().toString().padStart(2,'0')}:${now_date.getMinutes().toString().padStart(2,'0')}`;

            div.innerHTML = `<strong style="color:#53fc18;">${pseudo}</strong><span class="heure">${heure}</span> : ${message}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            document.getElementById('messageInput').value = '';
            document.getElementById('charCount').textContent = '0';
        }

        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>

</body>
</html>
