<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFK TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .bandeau {
            background-color: #53fc18;
            color: #0f0f0f;
            padding: 8px;
            font-weight: bold;
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
        }
        .bandeau-inner {
            display: inline-block;
            animation: defilement 15s linear infinite;
        }
        @keyframes defilement {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 20px auto;
            display: block;
            border: 3px solid #53fc18;
        }
        h1 { color: #53fc18; padding: 10px 20px 20px; font-size: 36px; }
        .visiteurs { color: #aaa; font-size: 14px; margin-bottom: 15px; }

        /* Stream + Chat côte à côte */
        .stream-section {
            display: flex;
            width: 90%;
            margin: 0 auto;
            gap: 10px;
        }
        .video-container { flex: 3; }
        iframe.stream { width: 100%; height: 500px; border: none; }
        .chat-container { flex: 1; }
        iframe.chat {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 10px;
        }

        .boutons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px auto;
            flex-wrap: wrap;
        }
        .discord-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
        }
        .discord-btn:hover { background-color: #4752c4; }

        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            .stream-section { flex-direction: column; width: 100%; }
            iframe.stream { height: 250px; }
            iframe.chat { height: 400px; }
            h1 { font-size: 24px; }
            .boutons { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <!-- Bandeau défilant -->
    <div class="bandeau">
        <span class="bandeau-inner">
            🛒 -5% sur le shop avec le code <strong>AFK-TV-2K26</strong> ! &nbsp;&nbsp;&nbsp;&nbsp;
            🛒 -5% sur le shop avec le code <strong>AFK-TV-2K26</strong> ! &nbsp;&nbsp;&nbsp;&nbsp;
            🛒 -5% sur le shop avec le code <strong>AFK-TV-2K26</strong> !
        </span>
    </div>

    <!-- Logo -->
    <img src="logo.png" alt="AFK TV Logo" class="logo">
    <h1>AFK TV</h1>

    <!-- Compteur vues -->
    <div class="visiteurs">👁️ <span id="compteur">...</span> vues</div>

    <!-- Stream + Chat Kick -->
    <div class="stream-section">
        <div class="video-container">
            <iframe
                class="stream"
                src="https://player.kick.com/c-slk"
                allowfullscreen
                allow="autoplay; fullscreen">
            </iframe>
        </div>
        <div class="chat-container">
            <iframe
                class="chat"
                src="https://www.kick.com/c-slk/chatroom">
            </iframe>
        </div>
    </div>

    <!-- Bouton Discord -->
    <div class="boutons">
        <a href="https://discord.gg/bZB4u7TQvk" class="discord-btn" target="_blank">
            💬 Rejoindre le Discord
        </a>
    </div>

    <script>
        // Compteur réel
        fetch('https://api.countapi.xyz/hit/afk-tv-baloo/visits')
            .then(res => res.json())
            .then(data => {
                document.getElementById('compteur').textContent = data.value;
            })
            .catch(() => {
                document.getElementById('compteur').textContent = '...';
            });
    </script>

</body>
</html>
